<!DOCTYPE html>
<html>
<head>
  <title>Quản lý bán hàng</title>
</head>
<body>

<h2>Thêm Mặt Hàng</h2>
<input id="ma" placeholder="Mã">
<input id="ten" placeholder="Tên">
<input id="nguon" placeholder="Nguồn gốc">
<input id="gia" placeholder="Giá">
<button onclick="add()">Thêm</button>

<h2>Danh sách</h2>
<table border="1" id="table"></table>

<script>
const API = "http://localhost:3000";

function load() {
  fetch(API + "/mathang")
    .then(res => res.json())
    .then(data => {
      let html = "<tr><th>Mã</th><th>Tên</th><th>Giá</th><th>Xóa</th></tr>";
      data.forEach(x => {
        html += `<tr>
          <td>${x.MaMH}</td>
          <td>${x.TenMH}</td>
          <td>${x.DonGia}</td>
          <td><button onclick="del('${x.MaMH}')">X</button></td>
        </tr>`;
      });
      document.getElementById("table").innerHTML = html;
    });
}

function add() {
  fetch(API + "/mathang", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      MaMH: ma.value,
      TenMH: ten.value,
      NguonGoc: nguon.value,
      DonGia: gia.value
    })
  }).then(() => load());
}

function del(id) {
  fetch(API + "/mathang/" + id, { method: "DELETE" })
    .then(() => load());
}

load();
</script>

</body>
</html>
